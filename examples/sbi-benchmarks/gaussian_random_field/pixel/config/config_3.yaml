# GRF-32 FieldDiT — experiment 2: deeper transformer, longer run
fielddit:
  in_channels: 1
  field_shape: [32, 32]
  encoder_widths: [32, 64]   # D=1 -> 16x16 meeting grid
  patch_size: 1              # -> 16x16 = 256 tokens
  cond_dim: 2                # theta = (log_std, alpha)
  cond_in_channels: 1
  param_dtype: bfloat16
  num_heads: 12
  axes_dim: [8, 20, 20]      
  depth: 4
  depth_single_blocks: 8
  cond_modulates_encoder: true

training:
  batch_size: 128
  val_batch_size: 128
  max_workers: 4             # grain mp_prefetch workers (null -> no prefetch)
  nsteps: 20000
  max_lr: 1.0e-4
  val_every: 100
  early_stopping: false
  multistep: 1
  experiment_id: 3
  train_model: true
  restore_model: false
  seed: 0

sampling:
  num_thetas: 3              # test rows used for plots
  nsamples: 16               # posterior samples per theta (P(k) statistics)
  nsamples_grid: 3           # samples shown per row in the field grid
  step_size: 0.01            # Euler ODE step (100 steps)
