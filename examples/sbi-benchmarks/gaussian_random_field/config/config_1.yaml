# GRF-32 FieldDiT — experiment 1: 10k-step baseline
fielddit:
  in_channels: 1
  field_shape: [32, 32]
  encoder_widths: [32, 64]   # D=1 -> 16x16 meeting grid
  patch_size: 1              # -> 16x16 = 256 tokens
  cond_dim: 2                # theta = (log_std, alpha)
  cond_in_channels: 1
  param_dtype: bfloat16
  num_heads: 6
  axes_dim: [8, 12, 12]      # hidden = 32 * 6 = 192 (vs 768 default)
  depth: 2
  depth_single_blocks: 2
  # defaults kept: res_blocks 2+2, norm_groups 8

training:
  batch_size: 256            # 64x fewer pixels than 256x256; plenty of headroom
  val_batch_size: 256
  max_workers: 4             # grain mp_prefetch workers (null -> no prefetch)
  nsteps: 10000
  max_lr: 1.0e-4
  val_every: 100
  early_stopping: false      # 10k steps IS the budget for this baseline
  multistep: 1
  experiment_id: 1
  train_model: true
  restore_model: false
  seed: 0

sampling:
  num_thetas: 3              # test rows used for plots
  nsamples: 16               # posterior samples per theta (P(k) statistics)
  nsamples_grid: 3           # samples shown per row in the field grid
  step_size: 0.01            # Euler ODE step (100 steps)
