task_name: gaussian_mixture
strategy:
  method: flow
  model: flux
optimizer:
  warmup_steps: 500
  decay_transition: 0.8
  max_lr: 0.0001
  min_lr: 1.0e-06
model:
  in_channels: 1
  vec_in_dim: null
  context_in_dim: 1
  mlp_ratio: 4
  num_heads: 4
  depth: 8
  depth_single_blocks: 16
  axes_dim:
  - 10
  qkv_bias: true
  params_dtype: bfloat16
  id_merge_mode: sum
  id_embedding_strategy:
  - absolute
  - absolute
training:
  batch_size: 256
  nsteps: 50000
  ema_decay: 0.999
  multistep: 1
  early_stopping: true
  val_every: 100
  experiment_id: 12
  restore_model: true
  train_model: false
  val_error_ratio: 1.3
