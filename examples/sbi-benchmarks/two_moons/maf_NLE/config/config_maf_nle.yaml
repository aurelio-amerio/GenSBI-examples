task_name: two_moons

strategy:
  method: nle
  model: maf

model:
  n_layers: 8
  transformer: rqspline      # affine | rqspline
  num_bins: 8                # used only when transformer == rqspline
  nn_width: 64
  nn_depth: 2
  permutation: reverse       # reverse | random
  standardize: true
  zero_init: true

optimizer:
  warmup_steps: 500
  decay_transition: 0.80
  max_lr: 2.0e-4
  min_lr: 2.0e-6

training:
  batch_size: 1024
  nsamples: 100000            # training subset; MUST be < task.max_samples
  nsteps: 50000
  ema_decay: 0.999
  val_every: 100
  early_stopping: true
  experiment_id: 1
  restore_model: true
  train_model: false

# Tempered SMC sampler: two-moons posteriors are multimodal, so a single MCMC/MCLMC
# chain would capture only one mode. SMC walks a particle cloud from prior -> posterior
# and populates all modes. num_particles is the number of posterior samples returned.
sampler:
  num_particles: 20000
  target_ess: 0.9
  num_mcmc_steps: 10
  inner_kernel: mclmc            # mclmc (adjusted MCLMC) | nuts
  inner_step_size: 0.1
  inner_num_integration_steps: 5

# Nested slice sampler (blackjax nss): a cross-check sampler for the same posterior.
# Handles the multimodal two-moons posterior without tempering and also estimates the
# log evidence. num_samples is the number of equal-weight posterior draws returned;
# num_delete and num_inner_steps resolve from num_live / target dim when left unset.
nested_sampler:
  num_live: 2000
  num_samples: 10000
  dlogz: -5.0                   # stop once live evidence < exp(-5) of accumulated
                               # (relative remaining evidence, not an absolute-logZ threshold).
  max_iterations: 100000
  num_rejuvenation_steps: 10   # posterior-invariant slice moves per equal-weight draw after
                               # resampling: with-replacement resampling duplicates draws when
                               # num_samples ~ run ESS; local moves break every atom without
                               # touching mode weights.

evaluation:
  observation_idx: 8
