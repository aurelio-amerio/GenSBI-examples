task_name: two_moons

strategy:
  method: "diffusion"
  model: "simformer"

optimizer:
  warmup_steps: 500
  decay_transition: 0.80
  max_lr: 1.0e-4
  min_lr: 1.0e-6

model:
  in_channels: 1
  val_emb_dim: 40
  id_emb_dim: 40
  cond_emb_dim: 10
  fourier_features: 256
  num_heads: 4
  num_layers: 8
  widening_factor: 3
  qkv_features: 40
  num_hidden_layers: 1

training:
  batch_size: 256
  nsteps: 50000
  ema_decay: 0.999
  multistep: 1
  early_stopping: true
  val_every: 100
  experiment_id: 6
  restore_model: false
  train_model: true
  val_error_ratio: 1.1
