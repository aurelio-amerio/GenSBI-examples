task_name: slcp

strategy:
  method: "flow"
  model: "flux"

optimizer:
  warmup_steps: 500
  decay_transition: 0.80
  max_lr: 1.0e-4
  min_lr: 1.0e-6

model:
  in_channels: 1
  vec_in_dim: null
  context_in_dim: 1
  mlp_ratio: 4
  num_heads: 6
  depth: 4
  depth_single_blocks: 8
  val_emb_dim: 20
  id_emb_dim: 10
  qkv_bias: true
  id_merge_mode: "concat"
  params_dtype: "bfloat16"
  id_embedding_strategy: ["absolute", "absolute"]

training:
  batch_size: 256
  nsteps: 100000
  ema_decay: 0.9999
  multistep: 1
  early_stopping: true
  val_every: 500
  experiment_id: 8
  restore_model: false
  train_model: true
  val_error_ratio: 1.3
