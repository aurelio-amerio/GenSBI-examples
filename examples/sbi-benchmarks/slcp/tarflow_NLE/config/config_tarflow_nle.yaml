task_name: slcp

strategy:
  method: nle
  model: tarflow_vector

# SLCP NLE flow: q(x | theta) over the 8-D observation conditioned on the 5-D
# parameter. TransformerFlow (TarFlow) is a transformer autoregressive flow;
# total width = head_dim * num_heads. The SLCP likelihood is genuinely simple
# (4 i.i.d. 2-D Gaussians), so a modest flow suffices.
#
# This variant swaps the conditioner: instead of the default per-token additive
# bias ("bias"), each of the 5 theta coordinates becomes its own prefix token
# ("vector" -> VectorConditioner). Richer conditioning at the cost of M = 5 extra
# tokens per block; everything else is identical to config_tarflow_nle_v4.yaml so
# the two runs are directly comparable.
model:
  num_blocks: 6              # transformer blocks (mirrors MAF n_layers)
  num_heads: 6               # attention heads; total width = head_dim * num_heads
  layers_per_block: 2        # attention layers per block (mirrors MAF nn_depth)
  head_dim: 12               # attention head dim
  block_size: 1              # tokens of size block_size; dim must be divisible by it
  permutation: flip          # flip | random
  standardize: true
  zero_init: true
  cond: vector               # bias (additive) | vector (per-coordinate prefix tokens) | image
  cond_channels: 1           # channels per theta coordinate; tabular SLCP theta is scalar

optimizer:
  warmup_steps: 500
  decay_transition: 0.80
  max_lr: 2.0e-4
  min_lr: 2.0e-6

training:
  batch_size: 1024
  nsamples: 500000            # training subset; MUST be < task.max_samples
  nsteps: 100000
  ema_decay: 0.999
  val_every: 100
  early_stopping: false
  experiment_id: 5            # distinct from v4 so checkpoints/c2st outputs don't collide
  restore_model: true         # no checkpoint yet: train from scratch first run
  train_model: false

# Tempered SMC sampler: the SLCP posterior is complex and multimodal (the scale
# params enter the likelihood squared and the correlation through tanh, giving
# sign-symmetric modes), so a single MCMC/MCLMC chain would capture only one mode.
# SMC walks a particle cloud from prior -> posterior and populates all modes.
# num_particles is the number of posterior samples returned.
sampler:
  num_particles: 20000
  target_ess: 0.5
  num_mcmc_steps: 20            # more rejuvenation than two-moons for the 5-D target
  inner_kernel: mclmc            # mclmc (adjusted MCLMC) | nuts
  inner_step_size: 0.1
  inner_num_integration_steps: 5

evaluation:
  observation_idx: 1
