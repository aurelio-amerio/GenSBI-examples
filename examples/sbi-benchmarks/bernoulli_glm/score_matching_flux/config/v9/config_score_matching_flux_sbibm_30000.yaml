task_name: bernoulli_glm

strategy:
  method: "score_matching"
  model: "flux"

optimizer:
  warmup_steps: 500
  decay_transition: 0.80
  max_lr: 1.0e-4
  min_lr: 1.0e-6

model:
  in_channels: 1
  vec_in_dim: null
  context_in_dim: 1
  mlp_ratio: 4
  num_heads: 4
  depth: 4
  depth_single_blocks: 8
  qkv_bias: true
  params_dtype: "bfloat16"
  id_embedding_strategy: ["absolute", "absolute"]
  id_merge_mode: "sum" # "sum" or "concat". Use "concat" for small models to reduce confusion.
  axes_dim: [20]
  
training:
  batch_size: 256
  nsteps: 100000
  ema_decay: 0.9999
  multistep: 1
  early_stopping: true
  val_every: 500
  experiment_id: 9
  restore_model: false
  train_model: true
  val_error_ratio: 1.3
